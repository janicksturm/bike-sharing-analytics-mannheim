services:
  api:
    build: .
    container_name: nextbike-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "uvicorn", "script.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  pipeline:
    build: .
    container_name: nextbike-pipeline
    volumes:
      - ./data:/app/data
    command: ["python", "main.py"]
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: nextbike-dashboard
    ports:
      - "3000:80"
    restart: unless-stopped
